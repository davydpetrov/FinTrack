<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack - Головна панель</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .logout-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }
        .logout-btn:hover { background-color: #c82333; }
        
        .dashboard-widgets {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .widget {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .widget h3 { margin: 0; color: #666; font-size: 16px; }
        .widget p { margin: 10px 0 0; font-size: 24px; font-weight: bold; }
        .income { color: #28a745; }
        .expense { color: #dc3545; }

        .main-content {
            display: flex;
            gap: 20px;
        }
        .add-form, .transaction-list {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .add-form { flex: 1; }
        .transaction-list { flex: 2; }
        
        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button[type="submit"]:hover { background-color: #0056b3; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        th { color: #666; }
        .delete-btn { color: #dc3545; cursor: pointer; background: none; border: none; font-weight: bold;}
        /* Стилі для бюджетів */
        .budgets-section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .budget-item { margin-bottom: 15px; }
        .budget-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px;}
        .progress-bar-bg { width: 100%; background-color: #e9ecef; border-radius: 4px; height: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background-color: #28a745; transition: width 0.3s ease, background-color 0.3s ease; }
        .delete-btn { color: #dc3545; cursor: pointer; background: none; border: none; font-weight: bold;}
        .edit-btn { color: #ffc107; cursor: pointer; background: none; border: none; font-weight: bold; margin-right: 10px;}
    </style>
</head>
<body>

    <div class="header">
        <div style="display: flex; align-items: center; gap: 20px;">
            <h2 style="margin: 0;">FinTrack Дашборд</h2>
            
            <div>
                <label for="filter-month" style="font-size: 14px; color: #666;">Період:</label>
                <input type="month" id="filter-month" style="margin: 0; padding: 5px; width: auto;">
            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <button class="logout-btn" style="background-color: #17a2b8;" onclick="window.location.href='/profile.html'">Мій Профіль</button>
            <button class="logout-btn" id="logout-btn">Вийти</button>
        </div>
    </div>

    <div class="dashboard-widgets">
        <div class="widget">
            <h3>Загальний Баланс</h3>
            <p id="total-balance">0.00 ₴</p>
        </div>
        <div class="widget">
            <h3>Доходи</h3>
            <p id="total-income" class="income">0.00 ₴</p>
        </div>
        <div class="widget">
            <h3>Витрати</h3>
            <p id="total-expense" class="expense">0.00 ₴</p>
        </div>
    </div>

    <div class="budgets-section">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin: 0;">Мої бюджети (Ліміти на місяць)</h3>
            <form id="budget-form" style="display: flex; gap: 10px; align-items: center;">
                <select id="budget-category" required style="margin: 0; width: auto; padding: 5px;">
                    <option value="" disabled selected>Категорія...</option>
                </select>
                <input type="number" id="budget-limit" placeholder="Ліміт (₴)" required style="margin: 0; width: 100px; padding: 5px;">
                <button type="submit" style="margin: 0; padding: 5px 15px; width: auto;">Встановити</button>
            </form>
        </div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
        
        <div id="budgets-container">
            <p style="color: #999; font-size: 14px;">Ліміти ще не встановлені.</p>
        </div>
    </div>

    <div class="main-content">
        <div class="add-form">
            <h3>Додати транзакцію</h3>
            <form id="transaction-form">
                <select id="type" required>
                    <option value="expense">Витрата</option>
                    <option value="income">Дохід</option>
                </select>
                <input type="number" id="amount" placeholder="Сума" step="0.01" required>
                <select id="category_id" required>
                    <option value="" disabled selected>Оберіть категорію...</option>
                </select>
                <input type="date" id="date" required>
                <input type="text" id="description" placeholder="Коментар">
                <button type="submit">Зберегти транзакцію</button>
            </form>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            
            <h3>Створити свою категорію</h3>
            <form id="category-form">
                <select id="cat-type" required>
                    <option value="expense">Для витрат</option>
                    <option value="income">Для доходів</option>
                </select>
                <input type="text" id="cat-name" placeholder="Назва (напр. 'Кіно')" required>

                <select id="cat-icon" required style="margin-bottom: 15px;">
                    <option value="📌">📌 Стандартна</option>
                    <option value="🛒">🛒 Покупки</option>
                    <option value="🚗">🚗 Транспорт</option>
                    <option value="🏠">🏠 Житло</option>
                    <option value="🎮">🎮 Розваги</option>
                    <option value="🍔">🍔 Їжа та Кафе</option>
                    <option value="🏥">🏥 Здоров'я</option>
                    <option value="💰">💰 Фінанси</option>
                </select>
                
                <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 15px;">
                    <label for="cat-color" style="color:#666;">Колір для графіка:</label>
                    <input type="color" id="cat-color" value="#ff0000" style="padding:0; width:40px; height:30px; border:none;">
                </div>
                
                <button type="submit" style="background-color: #28a745;">Створити категорію</button>
            </form>
        </div>

        <div style="flex: 1; display: flex; flex-direction: column; gap: 20px;">
            <div class="chart-container" style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                <h3>Структура витрат</h3>
                <canvas id="expenseChart"></canvas>
            </div>
            
            <div class="chart-container" style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                <h3>Динаміка за місяць</h3>
                <canvas id="dynamicsChart"></canvas>
            </div>
        </div>

        <div class="transaction-list">
            <h3>Останні транзакції</h3>
            <table>
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Тип</th>
                        <th>Сума</th>
                        <th>Коментар</th>
                        <th>Дія</th>
                    </tr>
                </thead>
                <tbody id="transactions-tbody">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
